<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- parchment background with rounded corners for iOS -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#f3ead8"/>
      <stop offset="60%" stop-color="#ede2c8"/>
      <stop offset="100%" stop-color="#e0d2ad"/>
    </radialGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="0.5" fill="rgba(80,60,30,0.15)"/>
      <circle cx="4" cy="4" r="0.4" fill="rgba(60,40,20,0.10)"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#grain)"/>

  <!-- subtle border ring -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="rgba(80,60,30,0.30)" stroke-width="2"/>

  <!-- feather, centered -->
  <g transform="translate(256 256) rotate(-20)" stroke="#2a2417" fill="none" stroke-linecap="round">
    <!-- outer shape -->
    <path d="M0 -180 Q-40 -60 -55 0 Q-70 90 0 175 Q70 90 55 0 Q40 -60 0 -180 Z"
          fill="#f3ead8" stroke="#2a2417" stroke-width="3"/>
    <!-- central rachis -->
    <line x1="0" y1="-180" x2="0" y2="175" stroke="#2a2417" stroke-width="2.5"/>
    <!-- barbs -->
    <g stroke="#2a2417" stroke-width="1.5">
      <line x1="0" y1="-140" x2="-32" y2="-130"/>
      <line x1="0" y1="-125" x2="30" y2="-115"/>
      <line x1="0" y1="-110" x2="-36" y2="-100"/>
      <line x1="0" y1="-95"  x2="34" y2="-85"/>
      <line x1="0" y1="-80"  x2="-40" y2="-70"/>
      <line x1="0" y1="-65"  x2="38" y2="-55"/>
      <line x1="0" y1="-50"  x2="-44" y2="-40"/>
      <line x1="0" y1="-35"  x2="42" y2="-25"/>
      <line x1="0" y1="-20"  x2="-48" y2="-10"/>
      <line x1="0" y1="-5"   x2="46" y2="5"/>
      <line x1="0" y1="10"   x2="-50" y2="20"/>
      <line x1="0" y1="25"   x2="48" y2="35"/>
      <line x1="0" y1="40"   x2="-50" y2="50"/>
      <line x1="0" y1="55"   x2="46" y2="65"/>
      <line x1="0" y1="70"   x2="-48" y2="80"/>
      <line x1="0" y1="85"   x2="42" y2="95"/>
      <line x1="0" y1="100"  x2="-42" y2="110"/>
      <line x1="0" y1="115"  x2="38" y2="125"/>
      <line x1="0" y1="130"  x2="-34" y2="140"/>
      <line x1="0" y1="145"  x2="28" y2="155"/>
    </g>
  </g>

  <!-- small rust accent dot for visual interest -->
  <circle cx="256" cy="80" r="4" fill="#b04a25"/>
</svg>
